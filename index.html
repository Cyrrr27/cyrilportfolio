<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#121212;
}

.container{
    width:360px;
    padding:45px;
    background:#1b1b1b;
    border:1px solid #2a2a2a;
    border-radius:14px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

h1{
    color:#ffffff;
    font-size:32px;
    margin-bottom:30px;
    letter-spacing:1px;
}

.info{
    margin-bottom:35px;
}

.label{
    color:#7a7a7a;
    font-size:12px;
    letter-spacing:2px;
    margin-top:18px;
}

.value{
    color:#f0f0f0;
    font-size:20px;
    font-weight:bold;
    margin-top:6px;
}

.btn{
    display:inline-block;
    width:100%;
    padding:14px;
    text-decoration:none;
    color:#ffffff;
    background:#2b2b2b;
    border:1px solid #3d3d3d;
    border-radius:8px;
    font-size:15px;
    transition:0.3s ease;
}

.btn:hover{
    background:#3a3a3a;
    border-color:#555;
}
</style>
</head>

<body>

<div class="container">
    <h1>Portfolio</h1>

    <div class="info">
        <div class="label">NAME</div>
        <div class="value">Cyril Emeterio</div>

        <div class="label">SECTION</div>
        <div class="value">BSIT1 SOUTH8</div>
    </div>

    <a href="EMETERIO_CYRIL_PORTFOLIO.pdf" target="_blank" class="btn">
        View Portfolio
    </a>
</div>

</body>
</html>
